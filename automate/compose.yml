services:
  postgres-db:
    image: postgres:17
    container_name: postgres-db
    environment:
      POSTGRES_USER: cursework
      POSTGRES_PASSWORD: cursework
      POSTGRES_DB: notesbook
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cursework -d notesbook"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - notesbook-network

volumes:
  postgres_data:

networks:
  notesbook-network:
    driver: bridge