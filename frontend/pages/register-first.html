<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />
        <link rel="stylesheet" href="../styles/globals.css" />
        <link rel="stylesheet" href="../styles/register-first-styles.css" />
    </head>
    <body>
        <div class="element">
            <div class="group"></div>
            <p class="text-wrapper">Ваше пространство<br />для заметок ждет вас!</p>
            <img class="img" src="../img/2025-12-15_19-02-57.png" style="width: 700px" />
            <div class="rectangle"></div>
            <div class="div">
                <div class="text-wrapper-2">Регистрация</div>
                <p class="p">
                    <span class="span">Уже есть аккаунт? </span>
                    <span class="text-wrapper-3" onclick="window.location.href = 'login.html'"
                        >Войдите!</span
                    >
                </p>
                <div class="group-2">
                    <div class="rectangle-2"></div>
                    <div
                        class="text-wrapper-4"
                        onclick="window.location.href = 'register-second.html'"
                    >
                        Продолжить
                    </div>
                </div>
                <div class="group-3">
                    <p class="div-2">
                        <span class="text-wrapper-5">Имя</span>
                        <span class="text-wrapper-6">*</span>
                    </p>
                    <div class="group-4">
                        <div class="rectangle-3"></div>
                        <div class="text-wrapper-7">Введите ваше имя</div>
                    </div>
                </div>
                <div class="group-5">
                    <div class="text-wrapper-8">Дата рождения</div>
                    <div class="group-4">
                        <div class="rectangle-3"></div>
                        <div class="text-wrapper-7">дд.мм.гггг</div>
                    </div>
                </div>
                <div class="group-6">
                    <p class="div-3">
                        <span class="text-wrapper-5">Фамилия</span>
                        <span class="text-wrapper-6">*</span>
                    </p>
                    <div class="group-4">
                        <div class="rectangle-3"></div>
                        <div class="text-wrapper-9">Введите вашу фамилию</div>
                    </div>
                </div>
                <div class="notesbook-wrapper">
                    <p class="notesbook">
                        <span
                            class="text-wrapper-10"
                            onclick="window.location.href = '../index.html'"
                            >NotesBook</span
                        >
                        <span class="text-wrapper-12">v2</span>
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
