<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />
        <link rel="stylesheet" href="../styles/login-styles.css" />
        <link rel="stylesheet" href="../styles/globals.css" />
    </head>
    <body>
        <div class="screen">
            <div class="group"><img class="element" src="../img/2025-12-15_19-02-57.png" /></div>
            <p class="text-wrapper">Ваше пространство<br />для заметок ждет вас!</p>
            <div class="div">
                <div class="text-wrapper-2">Вход</div>
                <p class="p">Войдите в аккаунт, чтобы получить доступ ко всем функциям!</p>
                <p class="div-2">
                    <span class="span">Еще нет аккаунта? </span>
                    <span
                        class="text-wrapper-3"
                        onclick="window.location.href = 'register-first.html'"
                        >Зарегистрируйтесь!</span
                    >
                </p>
                <div class="group-2">
                    <div class="rectangle"></div>
                    <div
                        class="text-wrapper-4"
                        onclick="window.location.href = 'personal-account.html'"
                    >
                        Войти
                    </div>
                </div>
                <div class="group-3">
                    <div class="text-wrapper-5">Логин</div>
                    <div class="group-4">
                        <div class="rectangle-2"></div>
                        <div class="text-wrapper-6">example@mail.com</div>
                    </div>
                </div>
                <div class="group-5">
                    <div class="text-wrapper-5">Пароль</div>
                    <div class="group-4">
                        <div class="rectangle-3"></div>
                        <div class="text-wrapper-6">password123</div>
                    </div>
                </div>
            </div>
            <div class="notesbook-wrapper">
                <p class="notesbook">
                    <span class="text-wrapper-7" onclick="window.location.href = '../index.html'"
                        >NotesBook</span
                    >
                    <span class="text-wrapper-9">v2</span>
                </p>
            </div>
            <div class="rectangle-4"></div>
        </div>
    </body>
</html>
