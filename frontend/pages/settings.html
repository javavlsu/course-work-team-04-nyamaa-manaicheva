<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />
        <link rel="stylesheet" href="../styles/globals.css" />
        <link rel="stylesheet" href="../styles/settings-styles.css" />
    </head>
    <body>
        <div class="div-wrapper">
            <div class="rectangle"></div>
            <div class="text-wrapper">Добавить</div>
            <img class="add-new" src="img/icons8-add-new-48-1.png" />

            <img class="vector" src="img/vector-1.svg" />
            <img class="test-account" src="img/icons8-test-account-48-1.png" />
            <img class="filter" src="img/icons8-filter-48-1.png" />
            <img class="settings" src="img/icons8-settings-48-1.png" />
            <img class="search" src="img/icons8-search-48-1-1.png" />
            <div class="text-wrapper-2">поиск</div>
            <div class="group">
                <img class="folder" src="img/icons8-folder-48-3-1.png" />

            <div class="text-wrapper-4">Заметка 1</div>
            <div class="text-wrapper-5">Заметка 2</div>
            <div class="text-wrapper-6">Заметка 3</div>
            <div class="text-wrapper-7">Новая заметка</div>
            <div class="rectangle-2"></div>
            <div class="reply-arrow-wrapper">
                <img class="reply-arrow" src="img/icons8-reply-arrow-48-1.png" />

            <div class="text-wrapper-8">Настройки</div>

                <div class="text-wrapper-9">Тема</div>

                <div class="text-wrapper-9">Шаблон заметки «Календарь»</div>
                <img class="img" src="img/vector-2-2.svg" />

            </div>
            <div class="group-5">
                <div class="text-wrapper-12">Изменить данные аккаунта</div>
                <div class="rectangle-3"></div>
            </div>
            <div class="group-6">
                <div class="text-wrapper-13">Посмотреть статистику</div>
                <div class="rectangle-3"></div>
            </div>
            <div class="group-7">
                <div class="text-wrapper-14">Выйти</div>
                <div class="rectangle-4"></div>
            </div>
